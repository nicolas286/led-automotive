backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/media/uploads"
public_folder: "/media/uploads"


collections:
  - name: "post"
    label: "Articles"
    label_singular: "Article"
    folder: "src/data/post"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}"
    media_folder: "public/media/posts/{{slug}}"
    public_folder: "/media/posts/{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Extrait", name: "excerpt", widget: "text", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Catégorie", name: "category", widget: "string", required: false }

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }

      - { label: "Auteur", name: "author", widget: "string", required: false }
      - { label: "Date de publication", name: "publishDate", widget: "datetime", required: false }
      - { label: "Date de mise à jour", name: "updateDate", widget: "datetime", required: false }
      - { label: "Brouillon", name: "draft", widget: "boolean", required: false, default: false }

      - label: "Metadata avancées"
        name: "metadata"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Meta title", name: "title", widget: "string", required: false }
          - { label: "Ignorer le template de titre", name: "ignoreTitleTemplate", widget: "boolean", required: false, default: false }
          - { label: "Canonical", name: "canonical", widget: "string", required: false }
          - { label: "Description", name: "description", widget: "text", required: false }

          - label: "Robots"
            name: "robots"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { label: "Index", name: "index", widget: "boolean", required: false, default: true }
              - { label: "Follow", name: "follow", widget: "boolean", required: false, default: true }

          - label: "Open Graph"
            name: "openGraph"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { label: "URL", name: "url", widget: "string", required: false }
              - { label: "Site name", name: "siteName", widget: "string", required: false }
              - { label: "Locale", name: "locale", widget: "string", required: false }
              - { label: "Type", name: "type", widget: "string", required: false }
              - label: "Images"
                name: "images"
                widget: "list"
                required: false
                fields:
                  - { label: "URL", name: "url", widget: "string" }
                  - { label: "Width", name: "width", widget: "number", required: false, value_type: "int" }
                  - { label: "Height", name: "height", widget: "number", required: false, value_type: "int" }

          - label: "Twitter"
            name: "twitter"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { label: "Handle", name: "handle", widget: "string", required: false }
              - { label: "Site", name: "site", widget: "string", required: false }
              - { label: "Card type", name: "cardType", widget: "string", required: false }

      - { label: "Contenu", name: "body", widget: "markdown", required: false }

  - name: "quad"
    label: "Quads"
    label_singular: "Quad"
    folder: "src/data/quad"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}"
    media_folder: "public/media/quads/{{slug}}"
    public_folder: "/media/quads/{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Marque", name: "brand", widget: "string", required: false, default: "BENDA" }
      - { label: "Modèle", name: "model", widget: "string", required: false }
      - { label: "Slug", name: "slug", widget: "string", hint: "Utilisé pour l’URL", required: true }

      - { label: "Extrait", name: "excerpt", widget: "text", required: false }
      - { label: "Description courte", name: "description", widget: "text", required: false }

      - { label: "Prix numérique", name: "price", widget: "number", required: false, value_type: "float" }
      - { label: "Prix affiché", name: "priceLabel", widget: "string", required: false }
      - { label: "Prix promo affiché", name: "promoPriceLabel", widget: "string", required: false }
      - { label: "En promo", name: "promo", widget: "boolean", required: false, default: false }

      - { label: "Mis en avant", name: "featured", widget: "boolean", required: false, default: false }
      - { label: "Ordre", name: "order", widget: "number", required: false, value_type: "int" }

      - { label: "Image principale", name: "image", widget: "image" }
      - label: "Galerie"
        name: "gallery"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }

      - { label: "Catégorie", name: "category", widget: "string", required: false }
      - { label: "Sous-catégorie", name: "subcategory", widget: "string", required: false }

      - { label: "Disponible", name: "available", widget: "boolean", required: false, default: true }
      - { label: "Label CTA", name: "ctaLabel", widget: "string", required: false, default: "Demander un essai" }

      - label: "Caractéristiques courtes"
        name: "shortSpecs"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Valeur", name: "value", widget: "string" }

      - label: "Caractéristiques techniques"
        name: "technicalSpecs"
        widget: "list"
        required: false
        fields:
          - { label: "Section", name: "section", widget: "string", required: false }
          - label: "Éléments"
            name: "items"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Valeur", name: "value", widget: "string" }

      - label: "Équipements de série"
        name: "standardEquipment"
        widget: "list"
        required: false
        field: { label: "Équipement", name: "value", widget: "string" }

      - label: "Produits liés"
        name: "related"
        widget: "list"
        required: false
        field: { label: "Slug ou identifiant", name: "value", widget: "string" }

      - label: "SEO simple"
        name: "seo"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Meta title", name: "title", widget: "string", required: false }
          - { label: "Meta description", name: "description", widget: "text", required: false }

      - label: "Metadata avancées"
        name: "metadata"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Meta title", name: "title", widget: "string", required: false }
          - { label: "Ignorer le template de titre", name: "ignoreTitleTemplate", widget: "boolean", required: false, default: false }
          - { label: "Canonical", name: "canonical", widget: "string", required: false }
          - { label: "Description", name: "description", widget: "text", required: false }

          - label: "Robots"
            name: "robots"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { label: "Index", name: "index", widget: "boolean", required: false, default: true }
              - { label: "Follow", name: "follow", widget: "boolean", required: false, default: true }

      - { label: "Contenu additionnel", name: "body", widget: "markdown", required: false }

  - name: "led"
    label: "Leds & accessoires"
    label_singular: "Produit LED"
    folder: "src/data/led"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}"
    media_folder: "public/media/led/{{slug}}"
    public_folder: "/media/led/{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "Utilisé pour l’URL", required: true }

      - { label: "Extrait", name: "excerpt", widget: "text", required: false }
      - { label: "Description courte", name: "description", widget: "text", required: false }

      - { label: "Prix numérique", name: "price", widget: "number", required: false, value_type: "float" }
      - { label: "Prix affiché", name: "priceLabel", widget: "string", required: false }
      - { label: "Prix promo affiché", name: "promoPriceLabel", widget: "string", required: false }
      - { label: "En promo", name: "promo", widget: "boolean", required: false, default: false }

      - { label: "Mis en avant", name: "featured", widget: "boolean", required: false, default: false }
      - { label: "Ordre", name: "order", widget: "number", required: false, value_type: "int" }

      - { label: "Image principale", name: "image", widget: "image" }
      - label: "Galerie"
        name: "gallery"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }

      - { label: "Catégorie", name: "category", widget: "string", required: false }
      - { label: "Sous-catégorie", name: "subcategory", widget: "string", required: false }

      - label: "Compatible avec"
        name: "compatibleWith"
        widget: "list"
        required: false
        field: { label: "Valeur", name: "value", widget: "string" }

      - { label: "Disponible", name: "available", widget: "boolean", required: false, default: true }
      - { label: "Label CTA", name: "ctaLabel", widget: "string", required: false, default: "Demander un devis" }

      - label: "Caractéristiques"
        name: "specs"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Valeur", name: "value", widget: "string" }

      - label: "Produits liés"
        name: "related"
        widget: "list"
        required: false
        field: { label: "Slug ou identifiant", name: "value", widget: "string" }

      - label: "SEO simple"
        name: "seo"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Meta title", name: "title", widget: "string", required: false }
          - { label: "Meta description", name: "description", widget: "text", required: false }

      - label: "Metadata avancées"
        name: "metadata"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Meta title", name: "title", widget: "string", required: false }
          - { label: "Ignorer le template de titre", name: "ignoreTitleTemplate", widget: "boolean", required: false, default: false }
          - { label: "Canonical", name: "canonical", widget: "string", required: false }
          - { label: "Description", name: "description", widget: "text", required: false }

          - label: "Robots"
            name: "robots"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { label: "Index", name: "index", widget: "boolean", required: false, default: true }
              - { label: "Follow", name: "follow", widget: "boolean", required: false, default: true }

      - { label: "Contenu additionnel", name: "body", widget: "markdown", required: false }